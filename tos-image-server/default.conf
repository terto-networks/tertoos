# nginx — servidor interno de imagens TertoOS
# Montado em: /etc/nginx/conf.d/default.conf  (container nginx:alpine)
# Serve /dados/tos-images como /usr/share/nginx/html (read-only).
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;

    # Página índice branded; autoindex como fallback para subpastas.
    location / {
        index index.html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Imagens: força download como binário e NUNCA como Content-Encoding: gzip
    # (senão o browser tentaria descomprimir o .img.gz e corromper o arquivo).
    location ~* \.(gz|qcow2|img|vmdk|iso|raw)$ {
        gzip off;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";
        # downloads grandes e resumíveis (Range) já são suportados p/ static.
    }
}
